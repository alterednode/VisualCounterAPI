defaults:
  detector:
    type: "openvino_yolo"
    model_path: "models/yolov8s_openvino_model/yolov8s.xml"
    device: "CPU"
    model_size: 640
    person_class_id: 0
    conf_threshold: 0.2
    nms_threshold: 0.4
  processing:
    scale: 1.0
    every_n_frames: 2
    max_processed_fps: 4.0
    infer_every_seconds: 0.0
    # crop_to_roi: true
    # crop_pad: 40
    show_preview: false
  smoothing:
    type: "time_weighted_average"
    params:
      window_seconds: 10.0

