defaults:
  detector:
    type: "openvino_yolo"
    model_path: "models/yolo26s_openvino_model/yolo26s.xml"
    device: "CPU"
    model_size: 640
    person_class_id: 0
    conf_threshold: 0.15
    nms_threshold: 0.6
  processing:
    scale: 1.0
  smoothing:
    type: "time_weighted_average"
    params:
      window_seconds: 5.0

cameras:

  timcam_cropped:
    source_url: "https://streamserve.ok.ubc.ca/LiveCams/timcam.stream_720p/playlist.m3u8"
    default_roi: "approx-line-area"
    processing:
      source_crop: [0.28, 0.22, 0.65, 0.6]
      latest_frame_queue_size: 3
      every_n_frames: 1
      max_processed_fps: null
      show_preview: true
    rois:
      approx-line-area:
        - [0.38, 0.25]
        - [0.35, 0.45]
        - [0.54, 0.45]
        - [0.58, 0.25]
