defaults:
  detector:
    type: "openvino_yolo"
    model_path: "models/yolov8s_openvino_model/yolov8s.xml"
    device: "CPU"
    model_size: 640
    person_class_id: 0
    conf_threshold: 0.15
    nms_threshold: 0.7
  processing:
    scale: 1.0
  smoothing:
    type: "time_weighted_average"
    params:
      window_seconds: 5.0

